# Phase 12 — Daily RSS ingest ONLY (no LLM — DEC-25)
name: Intel Daily Feed

on:
  schedule:
    # ~07:00 IST (01:30 UTC)
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Fetch only — no commit/push (smoke test)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Prevent stacked runs if a prior fetch hangs or is slow
concurrency:
  group: intel-daily-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install and fetch RSS
        run: |
          npm ci
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            npm run intel:fetch -- --dry-run
          else
            npm run intel:fetch
          fi

      - name: Commit and push daily feed
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/intel/feed/*.md
          if git diff --staged --quiet; then
            echo "No feed file changes to commit."
            exit 0
          fi
          git commit -m "intel: daily RSS feed $(date -u +%Y-%m-%d)"
          git push

