<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NorthStar AI - Private Workbench</title>
<!-- Google Fonts: Hanken Grotesk & JetBrains Mono -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed-dim": "#fbbc00",
                        "tertiary": "#fbbc00",
                        "surface-default": "#0B0F14",
                        "on-secondary-fixed-variant": "#462cb1",
                        "on-tertiary": "#402d00",
                        "secondary-fixed-dim": "#c9bfff",
                        "inverse-surface": "#e0e2ea",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#ffdfa0",
                        "private-workbench": "#907CFF",
                        "on-background": "#e0e2ea",
                        "on-secondary-container": "#b7aaff",
                        "error-container": "#93000a",
                        "secondary-container": "#462cb1",
                        "primary-fixed-dim": "#a2c9ff",
                        "tertiary-container": "#c69400",
                        "surface-raised": "#141A22",
                        "surface-container": "#1c2025",
                        "secondary": "#c9bfff",
                        "surface-tint": "#a2c9ff",
                        "outline-variant": "#414751",
                        "surface": "#101419",
                        "on-primary": "#00315b",
                        "success-green": "#10B981",
                        "on-primary-fixed-variant": "#004880",
                        "surface-variant": "#31353b",
                        "metrics-gold": "#FFBF00",
                        "primary": "#a2c9ff",
                        "on-tertiary-container": "#443000",
                        "error": "#ffb4ab",
                        "primary-fixed": "#d3e4ff",
                        "surface-container-highest": "#31353b",
                        "on-secondary": "#2e019b",
                        "outline": "#8b919c",
                        "on-surface": "#e0e2ea",
                        "surface-container-low": "#181c21",
                        "on-primary-container": "#003560",
                        "on-tertiary-fixed": "#261a00",
                        "on-tertiary-fixed-variant": "#5c4300",
                        "surface-dim": "#101419",
                        "surface-container-high": "#262a30",
                        "surface-bright": "#36393f",
                        "border-subtle": "rgba(51, 65, 85, 0.12)",
                        "background": "#101419",
                        "on-primary-fixed": "#001c38",
                        "surface-overlay": "#1C2430",
                        "on-error": "#690005",
                        "primary-container": "#5b9fed",
                        "surface-container-lowest": "#0a0e13",
                        "on-secondary-fixed": "#1a0063",
                        "inverse-on-surface": "#2d3136",
                        "inverse-primary": "#0060a8",
                        "on-surface-variant": "#c1c7d3",
                        "secondary-fixed": "#e5deff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "base": "8px",
                        "margin-mobile": "16px",
                        "margin-desktop": "32px",
                        "gutter": "24px",
                        "rail-width": "72px"
                    },
                    fontFamily: {
                        "headline-lg": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "label-md": ["JetBrains Mono"],
                        "metric-display": ["Hanken Grotesk"],
                        "label-sm": ["JetBrains Mono"]
                    },
                    fontSize: {
                        "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "headline-md": ["24px", { lineHeight: "32px", letterSpacing: "-0.01em", fontWeight: "600" }],
                        "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
                        "label-md": ["14px", { lineHeight: "20px", letterSpacing: "0.02em", fontWeight: "500" }],
                        "metric-display": ["48px", { lineHeight: "56px", letterSpacing: "-0.03em", fontWeight: "800" }],
                        "label-sm": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "500" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Base styles to ensure dark mode background is consistent */
        body {
            background-color: #0B0F14; /* surface-default */
            color: #e0e2ea; /* on-surface */
        }
        
        /* Subtle glowing orb effect in background for depth */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(144, 124, 255, 0.05) 0%, rgba(11, 15, 20, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center relative overflow-hidden font-body-md text-body-md">
<!-- Ambient background element for "Cinematic Material" feel -->
<div class="ambient-glow"></div>
<!-- Main Content Canvas (Navigation Shell Suppressed per Intent Rules) -->
<main class="w-full max-w-[420px] px-margin-mobile md:px-0 relative z-10">
<!-- Level 1 Card Container -->
<div class="bg-surface-raised border border-border-subtle rounded-xl p-margin-desktop shadow-2xl flex flex-col items-center text-center">
<!-- Lock Icon -->
<div class="w-16 h-16 rounded-full bg-surface-default border border-border-subtle flex items-center justify-center mb-gutter">
<span class="material-symbols-outlined text-3xl text-private-workbench" style="font-variation-settings: 'FILL' 1;">
                    lock
                </span>
</div>
<!-- Header Typography Anchor -->
<h1 class="font-headline-md text-headline-md text-on-surface mb-base">
                Private Workbench
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-margin-desktop">
                Restricted access area. Please authenticate to enter the workspace.
            </p>
<!-- Authentication Form -->
<form action="#" class="w-full flex flex-col gap-gutter" onsubmit="event.preventDefault();">
<!-- Password Input Group -->
<div class="w-full text-left">
<label class="sr-only" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline-variant pointer-events-none">
                            key
                        </span>
<input class="w-full bg-surface-default border border-outline-variant/30 text-on-surface font-body-md text-body-md rounded-lg py-3 pl-12 pr-4 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all placeholder:text-outline" id="password" name="password" placeholder="Enter access code" type="password"/>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-base w-full mt-base">
<!-- Primary Action -->
<button class="w-full bg-private-workbench text-surface-default font-label-md text-label-md py-3 px-6 rounded-full hover:bg-opacity-90 transition-opacity flex justify-center items-center gap-2" type="submit">
                        Unlock
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
<!-- Secondary Action -->
<button class="w-full bg-transparent text-on-surface-variant font-label-md text-label-md py-3 px-6 rounded-full border border-transparent hover:border-border-subtle hover:text-on-surface hover:bg-surface-variant/50 transition-all" type="button">
                        Request access
                    </button>
</div>
</form>
</div>
<!-- Minimal Footer -->
<div class="mt-gutter text-center w-full">
<p class="font-label-sm text-label-sm text-outline flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[14px]">shield</span>
                End-to-end encrypted
            </p>
</div>
</main>
</body></html>
